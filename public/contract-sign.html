<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Contract</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-58" />
  </head>
  <body class="contract-public-body">
    <main class="contract-public-shell">
      <section class="card contract-sign-card">
        <div class="section-head">
          <div>
            <h2>Contract signature</h2>
            <p class="workspace-subtitle">Please review the contract and sign below.</p>
          </div>
          <a class="secondary-button" href="/login">Back to login</a>
        </div>

        <div id="contract-summary" class="contract-summary"></div>
        <div class="contract-preview">
          <iframe id="contract-preview-frame" title="Contract preview"></iframe>
        </div>

          <div class="contract-signature-panel">
            <label>
              Овог
              <input id="signer-last-name" placeholder="Овог" />
            </label>
            <label>
              Нэр
              <input id="signer-first-name" placeholder="Нэр" />
            </label>
            <label>
              Регистр
              <input id="signer-register" placeholder="Регистр" />
            </label>
            <label class="contract-accept">
              <input type="checkbox" id="signer-accept" />
              Гэрээг уншиж танилцан, гэрээг хүлээн зөвшөөрч байна.
            </label>
            <div class="signature-box">
              <canvas id="signature-canvas" width="700" height="220"></canvas>
            </div>
          <div class="signature-actions">
            <button type="button" id="signature-clear" class="secondary-button">Clear</button>
            <button type="button" id="signature-submit">Confirm & Generate PDF</button>
          </div>
          <p id="signature-status" class="status"></p>
          <div id="signature-download" class="signature-download"></div>
        </div>
      </section>
    </main>
    <script src="/contracts.js?v=workspace-58"></script>
  </body>
</html>
