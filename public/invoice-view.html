<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Нэхэмжлэх</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #ffffff;
        color: #27272a;
        font-family: "Nunito", Arial, sans-serif;
        font-size: 13px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: center;
        gap: 14px;
        padding: 18px 16px;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid #eef1f7;
        backdrop-filter: blur(10px);
      }
      .toolbar a,
      .toolbar-button {
        min-width: 86px;
        min-height: 46px;
        padding: 11px 18px;
        border: none;
        border-radius: 999px;
        background: #253776;
        color: #fff;
        text-decoration: none;
        font: 800 16px/1.2 "Nunito", Arial, sans-serif;
        cursor: pointer;
      }
      .toolbar-button.secondary {
        background: #e9eef8;
        color: #2a3c78;
      }
      .toolbar-button.toolbar-save {
        background: #1f8f52;
      }
      .toolbar-button.toolbar-save:hover {
        background: #156d3e;
      }
      .invoice-edit-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cfd8e6;
        border-radius: 8px;
        font: inherit;
        background: #ffffff;
      }
      .invoice-items-table .invoice-edit-input,
      .invoice-items-table input.invoice-edit-input {
        text-align: right;
      }
      .invoice-items-table td.cell-desc .invoice-edit-input { text-align: left; }
      .payment-card .invoice-edit-input { font-size: 13px; }
      .payment-card.is-edit { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }
      .page {
        width: min(720px, calc(100vw - 48px));
        margin: 20px auto 40px;
        padding: 20px;
        background: #fff;
        border: 1px solid #dce3ef;
        border-radius: 14px;
        box-shadow: none;
      }
      .invoice-number {
        margin: 0 0 18px;
        color: #27272a;
        font-size: 18px;
        line-height: 1.15;
        font-weight: 500;
      }
      .header-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 28px;
      }
      .invoice-logo {
        width: 154px;
        max-width: 100%;
        display: block;
        margin-bottom: 10px;
      }
      .company-name {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 700;
        color: #27272a;
      }
      .company-block p,
      .customer-block p,
      .meta-note {
        margin: 0;
        font-size: 13px;
        line-height: 1.38;
      }
      .meta-note {
        text-align: right;
        color: #27272a;
      }
      .customer-block {
        padding-top: 80px;
      }
      .customer-block .label {
        display: block;
        margin-bottom: 4px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
      }
      .section-title {
        margin: 0 0 10px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
      }
      .invoice-items-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 12px;
        border: 1px solid #cfd8e6;
        overflow: hidden;
        margin-bottom: 28px;
      }
      th, td {
        padding: 10px 12px;
        border-bottom: 1px solid #cfd8e6;
        text-align: left;
        font-size: 13px;
        line-height: 1.25;
      }
      th {
        background: #fbfcfe;
        color: #27272a;
        font-weight: 700;
      }
      th:first-child,
      td:first-child {
        width: 46px;
      }
      td:last-child,
      th:last-child,
      td:nth-last-child(2),
      th:nth-last-child(2) {
        text-align: right;
      }
      .total-row td {
        font-weight: 700;
        background: #fff;
        border-bottom: 0;
      }
      .payment-stack {
        display: grid;
        gap: 16px;
        margin-bottom: 28px;
      }
      .payment-card {
        display: grid;
        grid-template-columns: 1.35fr 1.08fr 1.08fr 0.9fr 0.92fr;
        gap: 10px;
        align-items: center;
        min-height: 74px;
        padding: 16px 18px;
        border: 1px solid #cfd8e6;
        border-radius: 12px;
        background: #fff;
      }
      .payment-main,
      .payment-amount {
        min-width: 0;
        font-size: 13px;
        font-weight: 600;
        color: #27272a;
      }
      .payment-amount {
        text-align: right;
        white-space: nowrap;
      }
      .payment-meta {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      .meta-value {
        font-size: 13px;
        font-weight: 600;
        color: #27272a;
      }
      .meta-label {
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }
      .payment-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-width: 82px;
        min-height: 30px;
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .payment-status.paid {
        background: #dcf4e3;
        color: #1f8550;
      }
      .payment-status.overdue {
        background: #f8dede;
        color: #c44747;
      }
      .payment-status.waiting {
        background: #fff5bd;
        color: #8a4b12;
      }
      .bank-section {
        margin-top: 0;
        padding-bottom: 28px;
        border-bottom: 1px solid #d9e0ea;
      }
      .bank-grid {
        display: grid;
        gap: 4px;
        font-size: 13px;
        line-height: 1.35;
        color: #27272a;
      }
      .bank-line {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        align-items: baseline;
      }
      .bank-prefix {
        color: #64748b;
      }
      .bank-account-number {
        font-weight: 800;
      }
      .signature-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        margin-top: 24px;
        align-items: start;
      }
      .signature-card {
        position: relative;
        min-height: 218px;
        padding-top: 0;
      }
      .signature-label {
        position: relative;
        z-index: 3;
        min-height: 18px;
        margin-bottom: 112px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        background: #fff;
      }
      .signature-line {
        border-bottom: 1px dashed #d5ddec;
      }
      .accountant-stamp {
        position: absolute;
        left: 2px;
        bottom: 36px;
        width: 218px;
        z-index: 1;
        opacity: 0.98;
      }
      .accountant-signature {
        position: absolute;
        left: 64px;
        bottom: -34px;
        width: 290px;
        z-index: 2;
      }
      .signature-name {
        position: relative;
        z-index: 4;
        margin-top: 14px;
        font-size: 13px;
        font-weight: 700;
        color: #27272a;
      }
      .signature-role {
        position: relative;
        z-index: 4;
        color: #27272a;
        font-size: 13px;
      }
      .empty {
        text-align: center;
        color: #64748b;
        padding: 60px 20px;
      }
      @media print {
        .toolbar { display: none; }
        body { background: #fff; }
        .page { border: 0; margin: 0; padding: 24px; }
      }
      @media (max-width: 980px) {
        body { font-size: 16px; }
        .toolbar { gap: 10px; padding: 14px 10px; flex-wrap: wrap; }
        .page { width: calc(100vw - 24px); margin: 12px auto 24px; padding: 22px; }
        .header-grid, .signature-grid { grid-template-columns: 1fr; }
        .invoice-number { font-size: 24px; }
        .invoice-logo { width: 220px; }
        .customer-block { padding-top: 0; }
        .meta-note { text-align: left; }
        .payment-card { grid-template-columns: 1fr; min-height: auto; padding: 18px; }
        .payment-amount { text-align: left; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar" id="invoice-toolbar">
      <button type="button" class="toolbar-button secondary" id="btn-view">View</button>
      <button type="button" class="toolbar-button" id="btn-edit">Edit</button>
      <button type="button" class="toolbar-button toolbar-save" id="btn-save" hidden>Save</button>
      <button type="button" class="toolbar-button" id="btn-pdf">PDF Татах</button>
    </div>
    <div id="invoice-page" class="page"><p class="empty">Loading…</p></div>
    <script>
      const STATUS_MAP = {
        pending: { label: "Хүлээгдэж буй", className: "waiting" },
        waiting: { label: "Хүлээгдэж буй", className: "waiting" },
        paid: { label: "Төлөгдсөн", className: "paid" },
        overdue: { label: "Хугацаа хэтэрсэн", className: "overdue" },
      };
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
      function fmtMoney(n) {
        const num = Number(n) || 0;
        return num.toLocaleString("en-US") + " ₮";
      }
      function statusFor(key) {
        return STATUS_MAP[(key || "pending").toLowerCase()] || STATUS_MAP.pending;
      }
      async function load() {
        const id = new URLSearchParams(window.location.search).get("id");
        const page = document.getElementById("invoice-page");
        if (!id) { page.innerHTML = '<p class="empty">No invoice id provided.</p>'; return; }
        try {
          const res = await fetch("/api/invoices");
          const data = await res.json();
          const inv = (data.entries || []).find((x) => x.id === id);
          if (!inv) { page.innerHTML = '<p class="empty">Invoice not found.</p>'; return; }
          render(inv);
        } catch (err) {
          page.innerHTML = `<p class="empty">Could not load invoice: ${escapeHtml(err.message || err)}</p>`;
        }
      }
      let currentInvoice = null;
      let editMode = false;
      function render(inv) {
        currentInvoice = inv;
        const page = document.getElementById("invoice-page");
        const customerName = (inv.payerName || "CLIENT").toUpperCase();
        const issueDate = (inv.createdAt || "").slice(0, 10);
        const items = inv.items || [];
        const grandTotal = items.reduce((a, it) => a + (Number(it.qty) || 0) * (Number(it.price) || 0), 0) || (Number(inv.total) || 0);
        const itemsHtml = items.map((it, i) => editMode ? `
          <tr data-item-i="${i}">
            <td>${i + 1}</td>
            <td class="cell-desc"><input class="invoice-edit-input" data-field="description" value="${escapeHtml(it.description || "")}" /></td>
            <td><input class="invoice-edit-input" data-field="qty" type="number" min="0" value="${escapeHtml(it.qty || 0)}" /></td>
            <td><input class="invoice-edit-input" data-field="price" type="number" min="0" value="${escapeHtml(it.price || 0)}" /></td>
            <td>${fmtMoney((Number(it.qty) || 0) * (Number(it.price) || 0))}</td>
          </tr>
        ` : `
          <tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(it.description || "")}</td>
            <td>${escapeHtml(it.qty)}</td>
            <td>${fmtMoney(it.price)}</td>
            <td>${fmtMoney((Number(it.qty) || 0) * (Number(it.price) || 0))}</td>
          </tr>
        `).join("");
        const paymentsHtml = (inv.installments || []).map((inst, i) => {
          const s = statusFor(inst.status);
          if (editMode) {
            return `
              <div class="payment-card is-edit" data-inst-i="${i}">
                <div><span class="meta-label">Нэр</span><input class="invoice-edit-input" data-field="description" value="${escapeHtml(inst.description || "")}" /></div>
                <div><span class="meta-label">Нэхэмжилсэн огноо</span><input class="invoice-edit-input" data-field="issueDate" type="date" value="${escapeHtml(inst.issueDate || "")}" /></div>
                <div><span class="meta-label">Эцсийн хугацаа</span><input class="invoice-edit-input" data-field="dueDate" type="date" value="${escapeHtml(inst.dueDate || "")}" /></div>
                <div><span class="meta-label">Төлөв</span>
                  <select class="invoice-edit-input" data-field="status">
                    <option value="pending" ${(inst.status||"pending")==="pending"?"selected":""}>Хүлээгдэж буй</option>
                    <option value="paid" ${inst.status==="paid"?"selected":""}>Төлөгдсөн</option>
                    <option value="overdue" ${inst.status==="overdue"?"selected":""}>Хугацаа хэтэрсэн</option>
                  </select>
                </div>
                <div><span class="meta-label">Дүн</span><input class="invoice-edit-input" data-field="amount" type="number" min="0" value="${escapeHtml(inst.amount || 0)}" /></div>
              </div>
            `;
          }
          return `
            <div class="payment-card">
              <div class="payment-main">${escapeHtml(inst.description || "")}</div>
              <div class="payment-meta">
                <span class="meta-label">Нэхэмжилсэн огноо</span>
                <span class="meta-value">${escapeHtml(inst.issueDate || "-")}</span>
              </div>
              <div class="payment-meta">
                <span class="meta-label">Эцсийн хугацаа</span>
                <span class="meta-value">${escapeHtml(inst.dueDate || "-")}</span>
              </div>
              <div class="payment-meta">
                <span class="meta-label">Төлөв</span>
                <span class="payment-status ${s.className}">${s.label}</span>
              </div>
              <div class="payment-amount">${fmtMoney(inst.amount)}</div>
            </div>
          `;
        }).join("") || '<p class="empty">No installments.</p>';
        page.innerHTML = `
          <p class="invoice-number">Нэхэмжлэх #${escapeHtml(inv.serial)}</p>
          <div class="header-grid">
            <div class="company-block">
              <img class="invoice-logo" src="/assets/dtx-logo-blue-yellow.png" alt="Дэлхий Трэвел" onerror="this.style.display='none'" />
              <p class="company-name">Дэлхий Трэвел Икс ХХК (6925073)</p>
              <p>Улаанбаатар хот, ХУД, 17-р хороо</p>
              <p>Их Монгол Улс гудамж, Кинг Тауэр, 121 байр, 102 тоот</p>
              <p>info@travelx.mn</p>
              <p>+976 72007722</p>
            </div>
            <div>
              <p class="meta-note">Сангийн сайдын 2017 оны 12 дугаар сарын 05</p>
              <p class="meta-note">өдрийн 347 тоот тушаалын хавсралт</p>
              <div class="customer-block">
                <span class="label">Төлөгч</span>
                <p><strong>${escapeHtml(customerName)}</strong></p>
              </div>
            </div>
          </div>
          <p class="section-title">Үнийн мэдээлэл</p>
          <table class="invoice-items-table">
            <thead>
              <tr>
                <th>№</th>
                <th>Утга</th>
                <th>Тоо ширхэг</th>
                <th>Нэгжийн үнэ</th>
                <th>Нийт үнэ</th>
              </tr>
            </thead>
            <tbody>
              ${itemsHtml}
              <tr class="total-row">
                <td colspan="4">Нийт үнэ</td>
                <td>${fmtMoney(grandTotal)}</td>
              </tr>
            </tbody>
          </table>
          <p class="section-title">Төлбөрийн хуваарь</p>
          <div class="payment-stack">${paymentsHtml}</div>
          <div class="bank-section">
            <p class="section-title">Дансны мэдээлэл</p>
            <div class="bank-grid">
              <div>Дэлхий Трэвел Икс</div>
              <div class="bank-line">
                <span>Төрийн Банк</span>
                <span class="bank-prefix">MN030034</span>
                <strong class="bank-account-number">3432 7777 9999</strong>
              </div>
            </div>
          </div>
          <div class="signature-grid">
            <div class="signature-card">
              <div class="signature-label">Дэлхий Трэвел Икс ХХК</div>
              <div class="signature-line"></div>
              <img class="accountant-stamp" src="/assets/invoice-finance-stamp.png" alt="" onerror="this.style.display='none'" />
              <img class="accountant-signature" src="/assets/invoice-finance-signature.png" alt="" onerror="this.style.display='none'" />
              <div class="signature-name">Нягтлан</div>
              <div class="signature-role">Г.Басгалаан</div>
            </div>
            <div class="signature-card">
              <div class="signature-label">Төлөгч</div>
              <div class="signature-line"></div>
              <div class="signature-name">${escapeHtml(customerName)}</div>
            </div>
          </div>
        `;
        document.title = `Нэхэмжлэх #${inv.serial}`;
        const btnSave = document.getElementById("btn-save");
        const btnEdit = document.getElementById("btn-edit");
        const btnView = document.getElementById("btn-view");
        if (btnSave && btnEdit && btnView) {
          btnSave.hidden = !editMode;
          btnEdit.classList.toggle("secondary", editMode);
          btnView.classList.toggle("secondary", !editMode);
        }
      }
      function switchMode(mode) {
        editMode = mode === "edit";
        if (currentInvoice) render(currentInvoice);
      }
      async function saveInvoice() {
        if (!currentInvoice) return;
        const page = document.getElementById("invoice-page");
        const items = Array.from(page.querySelectorAll("[data-item-i]")).map((row) => {
          const obj = { description: "", qty: 0, price: 0 };
          row.querySelectorAll("[data-field]").forEach((el) => {
            const f = el.dataset.field;
            obj[f] = (f === "qty" || f === "price") ? Number(el.value) || 0 : el.value;
          });
          return obj;
        }).filter((it) => (it.description || "").trim());
        const installments = Array.from(page.querySelectorAll("[data-inst-i]")).map((row) => {
          const obj = { description: "", issueDate: "", dueDate: "", status: "pending", amount: 0 };
          row.querySelectorAll("[data-field]").forEach((el) => {
            const f = el.dataset.field;
            obj[f] = f === "amount" ? Number(el.value) || 0 : el.value;
          });
          return obj;
        });
        const payload = {
          tripId: currentInvoice.tripId,
          groupId: currentInvoice.groupId,
          payerId: currentInvoice.payerId || "",
          payerName: currentInvoice.payerName,
          participantIds: currentInvoice.participantIds || [],
          items,
          installments,
          currency: currentInvoice.currency || "MNT",
        };
        const btnSave = document.getElementById("btn-save");
        const orig = btnSave.textContent;
        btnSave.textContent = "Saving…";
        btnSave.disabled = true;
        try {
          const res = await fetch(`/api/invoices/${currentInvoice.id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error((await res.json()).error || "Save failed");
          editMode = false;
          await load();
          btnSave.textContent = "Saved";
          setTimeout(() => { btnSave.textContent = orig; btnSave.disabled = false; }, 1200);
        } catch (err) {
          alert(err.message || "Could not save invoice.");
          btnSave.textContent = orig;
          btnSave.disabled = false;
        }
      }
      function openPdf() {
        if (!currentInvoice) return;
        const src = encodeURIComponent(`/api/invoices/${currentInvoice.id}/pdf`);
        const title = encodeURIComponent(`Нэхэмжлэх ${currentInvoice.serial || ""}`);
        window.open(`/pdf-viewer?src=${src}&title=${title}`, "_blank", "noreferrer");
      }
      document.getElementById("btn-view").addEventListener("click", () => switchMode("view"));
      document.getElementById("btn-edit").addEventListener("click", () => switchMode("edit"));
      document.getElementById("btn-save").addEventListener("click", saveInvoice);
      document.getElementById("btn-pdf").addEventListener("click", openPdf);
      load();
    </script>
      <script src="/ui-dialog.js?v=workspace-1"></script>
  </body>
</html>
