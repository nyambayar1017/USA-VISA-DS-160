<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Нэхэмжлэх</title>
    <link rel="icon" id="invoice-favicon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #ffffff;
        color: #27272a;
        font-family: "Nunito", Arial, sans-serif;
        font-size: 13px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid #eef1f7;
        backdrop-filter: blur(10px);
      }
      .toolbar a,
      .toolbar-button {
        padding: 6px 14px;
        border: none;
        border-radius: 999px;
        background: #253776;
        color: #fff;
        text-decoration: none;
        font: 700 13px/1.2 "Nunito", Arial, sans-serif;
        cursor: pointer;
      }
      .toolbar-button.secondary {
        background: #e9eef8;
        color: #2a3c78;
      }
      .toolbar-button.toolbar-save {
        background: #1f8f52;
      }
      .toolbar-button.toolbar-save:hover {
        background: #156d3e;
      }
      .invoice-edit-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cfd8e6;
        border-radius: 8px;
        font: inherit;
        background: #ffffff;
      }
      .invoice-items-table .invoice-edit-input,
      .invoice-items-table input.invoice-edit-input {
        text-align: right;
      }
      .invoice-items-table td.cell-desc .invoice-edit-input { text-align: left; }
      .payment-card .invoice-edit-input { font-size: 13px; }
      .payment-card.is-edit { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }
      .page {
        width: min(720px, calc(100vw - 48px));
        margin: 20px auto 40px;
        padding: 20px;
        background: #fff;
        border: 1px solid #dce3ef;
        border-radius: 14px;
        box-shadow: none;
      }
      .invoice-number {
        margin: 0 0 18px;
        color: #27272a;
        font-size: 18px;
        line-height: 1.15;
        font-weight: 500;
      }
      .header-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 28px;
      }
      .invoice-logo {
        width: 154px;
        max-width: 100%;
        display: block;
        margin-bottom: 10px;
      }
      .company-name {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.25;
        font-weight: 700;
        color: #27272a;
      }
      .company-block p,
      .customer-block p,
      .meta-note {
        margin: 0;
        font-size: 13px;
        line-height: 1.38;
      }
      .meta-note {
        text-align: right;
        color: #27272a;
      }
      .customer-block {
        padding-top: 80px;
      }
      .customer-block .label {
        display: block;
        margin-bottom: 4px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
      }
      .section-title {
        margin: 0 0 10px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
      }
      .invoice-items-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 12px;
        border: 1px solid #cfd8e6;
        overflow: hidden;
        margin-bottom: 28px;
      }
      th, td {
        padding: 10px 12px;
        border-bottom: 1px solid #cfd8e6;
        text-align: left;
        font-size: 13px;
        line-height: 1.25;
      }
      th {
        background: #fbfcfe;
        color: #27272a;
        font-weight: 700;
      }
      th:first-child,
      td:first-child {
        width: 46px;
      }
      td:last-child,
      th:last-child,
      td:nth-last-child(2),
      th:nth-last-child(2) {
        text-align: right;
      }
      .total-row td {
        font-weight: 700;
        background: #fff;
        border-bottom: 0;
      }
      .payment-stack {
        display: grid;
        gap: 16px;
        margin-bottom: 28px;
      }
      .payment-card {
        display: grid;
        grid-template-columns: 1.35fr 1.08fr 1.08fr 0.9fr 0.92fr;
        gap: 10px;
        align-items: center;
        min-height: 74px;
        padding: 16px 18px;
        border: 1px solid #cfd8e6;
        border-radius: 12px;
        background: #fff;
      }
      .payment-main,
      .payment-amount {
        min-width: 0;
        font-size: 13px;
        font-weight: 600;
        color: #27272a;
      }
      .payment-amount {
        text-align: right;
        white-space: nowrap;
      }
      .payment-meta {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      .meta-value {
        font-size: 13px;
        font-weight: 600;
        color: #27272a;
      }
      .meta-label {
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }
      .payment-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-width: 82px;
        min-height: 30px;
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .payment-status.paid {
        background: #dcf4e3;
        color: #1f8550;
      }
      .payment-status.overdue {
        background: #f8dede;
        color: #c44747;
      }
      .payment-status.waiting {
        background: #fff5bd;
        color: #8a4b12;
      }
      .bank-section {
        margin-top: 0;
        padding-bottom: 28px;
        border-bottom: 1px solid #d9e0ea;
      }
      .bank-grid {
        display: grid;
        gap: 4px;
        font-size: 13px;
        line-height: 1.35;
        color: #27272a;
      }
      .bank-line {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        align-items: baseline;
      }
      .bank-prefix {
        color: #64748b;
      }
      .bank-account-number {
        font-weight: 800;
      }
      .signature-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        margin-top: 24px;
        align-items: start;
      }
      .signature-card {
        position: relative;
        min-height: 218px;
        padding-top: 0;
      }
      .signature-label {
        position: relative;
        z-index: 3;
        min-height: 18px;
        margin-bottom: 112px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        background: #fff;
      }
      .signature-line {
        border-bottom: 1px dashed #d5ddec;
      }
      .accountant-stamp {
        position: absolute;
        left: 2px;
        bottom: 36px;
        width: 218px;
        z-index: 1;
        opacity: 0.98;
      }
      .accountant-signature {
        position: absolute;
        left: 64px;
        bottom: -34px;
        width: 290px;
        z-index: 2;
      }
      .signature-name {
        position: relative;
        z-index: 4;
        margin-top: 14px;
        font-size: 13px;
        font-weight: 700;
        color: #27272a;
      }
      .signature-role {
        position: relative;
        z-index: 4;
        color: #27272a;
        font-size: 13px;
      }
      .empty {
        text-align: center;
        color: #64748b;
        padding: 60px 20px;
      }
      @media print {
        .toolbar { display: none; }
        body { background: #fff; }
        .page { border: 0; margin: 0; padding: 24px; }
      }
      @media (max-width: 980px) {
        body { font-size: 16px; }
        .toolbar { gap: 10px; padding: 14px 10px; flex-wrap: wrap; }
        .page { width: calc(100vw - 24px); margin: 12px auto 24px; padding: 22px; }
        .header-grid, .signature-grid { grid-template-columns: 1fr; }
        .invoice-number { font-size: 24px; }
        .invoice-logo { width: 220px; }
        .customer-block { padding-top: 0; }
        .meta-note { text-align: left; }
        .payment-card { grid-template-columns: 1fr; min-height: auto; padding: 18px; }
        .payment-amount { text-align: left; }
      }
      /* USM invoice — mirrors the Nomadays/Steppe Mongolia public layout
         (Tailwind-based) using plain CSS. Scoped under .usm-view so it
         doesn't fight the legacy DTX styles above. */
      .page.usm-view { width: min(800px, calc(100vw - 32px)); padding: 24px; border-radius: 10px; }
      .usm-view * { box-sizing: border-box; }
      .usm-view .muted { color: #71717a; }
      .usm-view .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .usm-view h1.usm-title { margin: 0 0 16px; font-size: 20px; font-weight: 400; line-height: 1.2; }
      .usm-view .usm-header { margin-bottom: 24px; }
      /* Logo: pinned left, bigger to match the public reference. align-self:
         flex-start so flex-column gap doesn't centre it. */
      .usm-view .usm-logo {
        height: 80px; width: auto; object-fit: contain;
        display: block; align-self: flex-start; margin-left: 0;
      }
      .usm-view .usm-company-name { font-weight: 700; }
      .usm-view .usm-company-block { display: flex; flex-direction: column; gap: 8px; line-height: 1.45; }
      /* Pad-top so "Bill to" aligns with "Unlock Steppe Mongolia LLC"
         in the left column (which sits below the 80px logo). */
      .usm-view .usm-billto-block {
        display: flex; flex-direction: column; gap: 8px;
        padding-top: 92px;
      }
      .usm-view .usm-billto-label { color: #71717a; font-size: 13px; }
      .usm-view .usm-billto-value { font-weight: 500; }
      .usm-view .usm-section-title { color: #71717a; margin: 0 0 8px; font-size: 14px; }
      .usm-view .usm-table-wrap { overflow: hidden; border-radius: 6px; border: 1px solid #d1d5db; margin-bottom: 24px; }
      .usm-view table.usm-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .usm-view .usm-table th { background: #f9fafb; font-weight: 700; padding: 8px; text-align: left; border-bottom: 1px solid #d1d5db; }
      .usm-view .usm-table td { padding: 8px; border-bottom: 1px solid #d1d5db; }
      .usm-view .usm-table tr:last-child td { border-bottom: 0; }
      .usm-view .usm-table .right { text-align: right; white-space: nowrap; }
      .usm-view .usm-table .total-row td { padding: 8px; }
      .usm-view .usm-total-line { display: flex; align-items: center; justify-content: space-between; font-weight: 700; }
      .usm-view .usm-installments { display: grid; gap: 16px; margin-bottom: 24px; }
      .usm-view .usm-inst-card {
        display: flex; justify-content: space-between; gap: 8px;
        padding: 16px; border: 1px solid #d1d5db; border-radius: 8px;
      }
      .usm-view .usm-inst-desc { width: 30%; display: flex; align-items: center; font-weight: 700; }
      .usm-view .usm-inst-cell { width: 20%; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
      .usm-view .usm-inst-cell .label { color: #71717a; font-size: 13px; }
      .usm-view .usm-inst-status { width: 15%; display: flex; flex-direction: column; }
      .usm-view .usm-inst-status .label { padding-left: 12px; color: #71717a; font-size: 13px; }
      .usm-view .usm-inst-amount { width: 15%; display: flex; align-items: center; justify-content: flex-end; font-weight: 700; white-space: nowrap; }
      .usm-view .usm-pill {
        display: inline-flex; align-items: center; align-self: flex-start;
        padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 500;
      }
      .usm-view .usm-pill.paid     { background: #dcfce7; color: #166534; }
      .usm-view .usm-pill.waiting  { background: #fef3c7; color: #854d0e; }
      .usm-view .usm-pill.overdue  { background: #fee2e2; color: #991b1b; }
      .usm-view .usm-pill.cancelled{ background: #f3f4f6; color: #374151; }
      .usm-view .usm-bank-row {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        margin-bottom: 24px;
      }
      .usm-view .usm-bank-row.bordered { padding-bottom: 24px; border-bottom: 1px solid #d1d5db; }
      .usm-view .usm-bank-row .label { color: #71717a; font-size: 13px; }
      .usm-view .usm-bank-row .value { display: flex; flex-direction: column; gap: 2px; font-size: 13px; line-height: 1.5; }
      .usm-view .usm-bank-row .value > div { line-height: 1.45; }
      .usm-view .usm-bank-row .value .sub { color: #71717a; }
      .usm-view .usm-bank-row .value .group { display: flex; flex-direction: column; margin-bottom: 8px; }
      .usm-view .usm-suggestion {
        display: flex; flex-direction: column; gap: 8px;
        color: #71717a; font-size: 13px;
      }
      .usm-view .usm-suggestion ul { padding-left: 24px; margin: 0; list-style: disc; }
      .usm-view .usm-suggestion .accent { color: #b91c1c; font-weight: 700; }
      .usm-view .usm-footer-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
        margin-top: 32px; padding-top: 32px; border-top: 1px solid #e5e7eb;
      }
      /* Footer column needs to be tall enough for the stamp to overlap
         the company label, signature, and accountant name from one
         absolutely-positioned image. */
      .usm-view .usm-foot { position: relative; min-height: 260px; }
      .usm-view .usm-foot-label {
        position: relative; z-index: 3;
        color: #71717a; font-size: 13px; margin-bottom: 8px;
      }
      .usm-view .usm-foot-stamp {
        position: absolute; top: 12px; left: 16px;
        z-index: 1; pointer-events: none;
      }
      .usm-view .usm-foot-stamp img {
        height: 240px; width: auto; object-fit: contain; opacity: 0.92;
      }
      .usm-view .usm-foot-row {
        position: absolute; left: 0; right: 0; bottom: 0;
        display: flex; align-items: flex-end; gap: 8px;
      }
      .usm-view .usm-foot-name {
        position: relative; z-index: 3;
        font-size: 14px; font-weight: 700;
      }
      .usm-view .usm-foot-line {
        position: relative; flex: 1; height: 60px; margin-bottom: 4px;
        border-bottom: 2px dotted #cbd5e1;
      }
      .usm-view .usm-foot-line img {
        position: absolute; left: 0; bottom: 4px;
        height: 90px; width: auto; object-fit: contain;
        z-index: 4;
      }
      @media (max-width: 720px) {
        .usm-view .row { grid-template-columns: 1fr; }
        .usm-view .usm-bank-row { grid-template-columns: 1fr; }
        .usm-view .usm-footer-grid { grid-template-columns: 1fr; gap: 24px; }
        .usm-view .usm-inst-card { flex-direction: column; }
        .usm-view .usm-inst-desc,
        .usm-view .usm-inst-cell,
        .usm-view .usm-inst-status,
        .usm-view .usm-inst-amount { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar" id="invoice-toolbar">
      <button type="button" class="toolbar-button" id="btn-pdf">PDF Татах</button>
    </div>
    <div id="invoice-page" class="page"><p class="empty">Loading…</p></div>
    <script>
      const STATUS_MAP = {
        pending: { label: "Хүлээгдэж буй", className: "waiting" },
        waiting: { label: "Хүлээгдэж буй", className: "waiting" },
        paid: { label: "Төлөгдсөн", className: "paid" },
        overdue: { label: "Хугацаа хэтэрсэн", className: "overdue" },
      };
      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
      const CURRENCY_SYMBOLS = {
        USD: "$", EUR: "€", GBP: "£", JPY: "¥", CNY: "¥",
        KRW: "₩", RUB: "₽", AUD: "A$", MNT: "₮",
      };
      function fmtMoney(n, currency) {
        const num = Number(n) || 0;
        const ccy = (currency || (currentInvoice && currentInvoice.currency) || "MNT").toUpperCase();
        return num.toLocaleString("en-US") + " " + (CURRENCY_SYMBOLS[ccy] || ccy);
      }
      function companyFromSerial(serial) {
        const s = String(serial || "");
        if (s.startsWith("T-")) return "DTX";
        if (s.startsWith("S-")) return "USM";
        return "DTX";
      }
      // Label sets for USM template. EUR invoices render in French
       // (the user's reference Origins Voyages PDF), everything else in English.
      const USM_LABELS = {
        en: {
          title: "Invoice", billTo: "Bill to", billingAddress: "Billing address",
          priceDetail: "Price detail",
          colN: "№", colDesc: "Description", colAmount: "Amount",
          colUnitPrice: "Unit price", colTotal: "Total", rowTotal: "Total",
          installments: "Installments",
          issueDate: "Issue date", dueDate: "Due date", status: "Status",
          benNameAddr: "BENEFICIARY'S ACCOUNT NAME, ADDRESS:",
          benAccountNo: "BENEFICIARY'S ACCOUNT NUMBER:",
          benBank: "BENEFICIARY BANK:",
          benIntermediary: "INTERMEDIARY BANK:",
          name: "Name", address: "Address",
          accountFor: "Account number / {ccy}", iban: "IBAN number",
          accountant: "Accountant", companyLabel: "Unlock Steppe Mongolia LLC",
          statusPending: "Pending", statusPaid: "Paid",
          statusOverdue: "Overdue", statusCancelled: "Cancelled",
          editDescription: "Description", editAmount: "Amount",
        },
        fr: {
          title: "Facture", billTo: "Facturé à", billingAddress: "Adresse de facturation",
          priceDetail: "Détail du tarif",
          colN: "№", colDesc: "Description", colAmount: "Montant",
          colUnitPrice: "Prix unitaire", colTotal: "Total", rowTotal: "Total",
          installments: "Versements",
          issueDate: "En date du", dueDate: "À régler avant le", status: "Statut",
          benNameAddr: "BÉNÉFICIAIRE — NOM ET ADRESSE :",
          benAccountNo: "NUMÉRO DE COMPTE BÉNÉFICIAIRE :",
          benBank: "BANQUE BÉNÉFICIAIRE :",
          benIntermediary: "BANQUE INTERMÉDIAIRE :",
          name: "Nom", address: "Adresse",
          accountFor: "Numéro de compte / {ccy}", iban: "Numéro IBAN",
          accountant: "Comptable", companyLabel: "Unlock Steppe Mongolia LLC",
          statusPending: "En attente", statusPaid: "Payé",
          statusOverdue: "En retard", statusCancelled: "Annulé",
          editDescription: "Description", editAmount: "Montant",
        },
        mn: {
          title: "Нэхэмжлэх", billTo: "Төлөгч", billingAddress: "Хаяг",
          priceDetail: "Үнийн мэдээлэл",
          colN: "№", colDesc: "Утга", colAmount: "Тоо ширхэг",
          colUnitPrice: "Нэгжийн үнэ", colTotal: "Нийт", rowTotal: "Нийт",
          installments: "Төлбөрийн хуваарь",
          issueDate: "Нэхэмжилсэн огноо", dueDate: "Эцсийн хугацаа", status: "Төлөв",
          benNameAddr: "ХҮЛЭЭН АВАГЧИЙН НЭР, ХАЯГ:",
          benAccountNo: "ХҮЛЭЭН АВАГЧИЙН ДАНСНЫ ДУГААР:",
          benBank: "ХҮЛЭЭН АВАГЧ БАНК:",
          benIntermediary: "ЗУУЧЛАГЧ БАНК:",
          name: "Нэр", address: "Хаяг",
          accountFor: "Дансны дугаар / {ccy}", iban: "IBAN дугаар",
          accountant: "Нягтлан", companyLabel: "Unlock Steppe Mongolia LLC",
          statusPending: "Хүлээгдэж буй", statusPaid: "Төлөгдсөн",
          statusOverdue: "Хугацаа хэтэрсэн", statusCancelled: "Цуцалсан",
          editDescription: "Утга", editAmount: "Дүн",
        },
      };
      function usmLangForCurrency(ccy) {
        return (ccy || "").toUpperCase() === "EUR" ? "fr" : "en";
      }
      // Trip language → invoice language (USM only). DTX always renders
      // in Mongolian regardless of trip language.
      function usmLangForTrip(tripLanguage, ccy) {
        const name = String(tripLanguage || "").trim().toLowerCase();
        if (name === "french" || name === "français") return "fr";
        if (name === "english") return "en";
        if (name === "mongolian" || name === "монгол") return "mn";
        return usmLangForCurrency(ccy);
      }
      // Localised "Download PDF" label for the toolbar.
      function pdfButtonLabel(inv) {
        if (companyFromSerial(inv?.serial) !== "USM") return "PDF Татах";
        const lang = usmLangForTrip(inv?.tripLanguage, inv?.currency);
        if (lang === "fr") return "Télécharger PDF";
        if (lang === "mn") return "PDF Татах";
        return "Download PDF";
      }

      // Bank info by currency for USM. Mirrors the server-side PDF builder.
      const USM_BANK = {
        USD: { account: "436044172", iban: "MN53 0004000 436044172",
          intermediaries: [
            { swift: "IRVTUS3N", name: "THE BANK OF NEW YORK MELLON",
              address: "240 GREENWICH STREET NEWYORK NY 10286, US" },
            { swift: "OCBCSGSG", chips: "010275",
              name: "OVERSEA-CHINESE BANKING CORPORATION LIMITED",
              address: "OCBC CENTRE FLOOR 10 63 CHULIA STREET SINGAPORE" },
            { swift: "KASITHBK", chips: "008942",
              name: "KASIKORNBANK PUBLIC COMPANY LIMITED",
              address: "27/1 RATBURANA RD. 1 SOI RATBURANA BANGKOK, THAILAND" },
          ]
        },
        EUR: { account: "436044173", iban: "MN26 0004000 436044173",
          intermediaries: [
