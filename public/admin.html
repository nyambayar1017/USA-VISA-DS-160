<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelX Admin</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-246" />
  </head>
  <body class="app-body" data-page="admin">
    <div class="workspace-shell">
      <aside class="workspace-sidebar" data-workspace-sidebar></aside>

      <main class="workspace-main">
        <section class="workspace-topbar">
          <div>
            <p class="workspace-kicker">Admin</p>
            <h1>Team Access And Visa Submissions</h1>
            <p class="workspace-subtitle">Approve staff accounts and review DS-160 submissions from one place.</p>
          </div>
          <div class="workspace-profile">
            <span class="workspace-profile-label">Signed in</span>
            <strong data-profile-name>TravelX Staff</strong>
            <span data-profile-email>Loading profile...</span>
          </div>
        </section>

        <section class="card">
        <div class="dashboard-head">
          <h2>Integrations</h2>
        </div>
        <p style="margin: 0 0 12px; color: #475569;">Connect mailboxes, manage external services.</p>
        <a class="primary-pill" href="/mail-settings">Mail Settings →</a>
        </section>

        <section class="card">
        <div class="dashboard-head">
          <h2>Team Access</h2>
          <div class="dashboard-actions">
            <button id="users-refresh-button" type="button">Refresh</button>
            <button id="logout-button" type="button">Logout</button>
          </div>
        </div>
        <div id="user-list" class="submission-list"></div>
        </section>

        <section class="card">
        <div class="dashboard-head">
          <h2>DS-160 Responses</h2>
          <div class="dashboard-actions">
            <button id="export-button" type="button">Export CSV</button>
            <button id="refresh-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="submission-list" class="submission-list"></div>
        </section>
      </main>
    </div>

    <script src="/compress-upload.js?v=workspace-1"></script>
    <script src="/app-shell.js?v=workspace-108"></script>
    <script src="/admin.js?v=workspace-14"></script>
      <script src="/ui-dialog.js?v=workspace-1"></script>
  </body>
</html>
