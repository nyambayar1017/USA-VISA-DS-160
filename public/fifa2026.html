<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA 2026 Tickets</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-fifa-1" />
  </head>
  <body class="fifa-public-body">
    <main class="fifa-public-shell">
      <section class="fifa-public-hero">
        <div>
          <p class="eyebrow">FIFA 2026</p>
          <h1>Live Ticket Availability</h1>
          <p class="intro">Browse the currently available ticket lots by match, city, category, and seat area. This page updates automatically whenever a manager sells tickets in backoffice.</p>
        </div>
        <div class="fifa-public-summary">
          <article>
            <span>Visible lots</span>
            <strong id="public-summary-lots">0</strong>
          </article>
          <article>
            <span>Available units</span>
            <strong id="public-summary-units">0</strong>
          </article>
        </div>
      </section>

      <section class="card fifa-public-panel">
        <div class="camp-filters fifa-filters">
          <label>
            Search
            <input id="public-filter-search" type="search" placeholder="Match, team, city, venue" />
          </label>
          <label>
            Stage
            <select id="public-filter-stage">
              <option value="">All stages</option>
            </select>
          </label>
          <label>
            City
            <select id="public-filter-city">
              <option value="">All cities</option>
            </select>
          </label>
          <label>
            Category
            <select id="public-filter-category">
              <option value="">All categories</option>
            </select>
          </label>
          <label>
            Max price
            <input id="public-filter-price" type="number" min="0" step="1" placeholder="Any" />
          </label>
        </div>

        <div id="fifa-public-list" class="fifa-public-grid"></div>
      </section>
    </main>

    <script src="/fifa2026.js?v=workspace-fifa-1"></script>
  </body>
</html>
