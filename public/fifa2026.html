<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA 2026 Билет</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-fifa-7" />
  </head>
  <body class="fifa-public-body">
    <main class="fifa-public-shell">
      <section class="fifa-public-hero">
        <div>
          <p class="eyebrow">FIFA 2026</p>
          <h1>FIFA World Cup 2026 Билет</h1>
          <p class="intro">Бүх тоглолтын хуваарийг тугтай нь харж, тоглолт дээр дарж тухайн тоглолтын нийтлэгдсэн бүх билетийг үзнэ үү. Энэ хуудсанд үнийн мэдээлэл харагдахгүй.</p>
        </div>
        <div class="fifa-public-summary">
          <article>
            <span>Тоглолт</span>
            <strong id="public-summary-lots">0</strong>
          </article>
          <article>
            <span>Нийт билет</span>
            <strong id="public-summary-total">3340</strong>
          </article>
          <article>
            <span>Боломжтой билет</span>
            <strong id="public-summary-units">0</strong>
          </article>
        </div>
      </section>

      <section class="card fifa-public-panel">
        <div class="camp-filters fifa-filters">
          <label>
            Хайх
            <input id="public-filter-search" type="search" placeholder="Тоглолт, баг, хот, цэнгэлдэх" />
          </label>
          <label>
            Шат
            <select id="public-filter-stage">
              <option value="">Бүх шат</option>
            </select>
          </label>
          <label>
            Хот
            <select id="public-filter-city">
              <option value="">Бүх хот</option>
            </select>
          </label>
          <label>
            Ангилал
            <select id="public-filter-category">
              <option value="">Бүх ангилал</option>
            </select>
          </label>
          <label>
            Эхлэх огноо
            <input id="public-filter-date-from" type="date" />
          </label>
          <label>
            Дуусах огноо
            <input id="public-filter-date-to" type="date" />
          </label>
        </div>

        <div class="fifa-list-meta">
          <strong id="public-list-count">0 тоглолт</strong>
          <span id="public-list-meta">Нийт боломжтой билет: 0</span>
        </div>

        <div id="fifa-public-list" class="fifa-public-table-wrap"></div>
      </section>
    </main>

    <script src="/fifa2026.js?v=workspace-fifa-9"></script>
  </body>
</html>
