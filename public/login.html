<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelX Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-153" />
  </head>
  <body>
    <main class="shell">
      <nav class="site-nav">
        <a class="site-brand" href="/backoffice">TravelX</a>
        <div class="site-nav-links">
          <a href="/backoffice">Backoffice</a>
          <a href="/ds160">DS-160</a>
          <a href="/camp">Trips</a>
        </div>
      </nav>
      <section class="hero">
        <p class="eyebrow">Secure Access</p>
        <h1>Login Or Sign Up</h1>
        <p class="intro">
          Staff first signs up here. After admin approval, they can log in with their own account.
        </p>
      </section>

      <section class="card auth-card">
        <div class="auth-grid">
          <form id="login-form" class="auth-panel">
            <h2>Login</h2>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Password
              <input name="password" type="password" required />
            </label>
            <div class="actions">
              <button type="submit">Login</button>
              <p id="login-status" class="status"></p>
            </div>
          </form>

          <form id="register-form" class="auth-panel">
            <h2>Sign Up</h2>
            <label>
              Full name
              <input name="fullName" />
            </label>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Password
              <input name="password" type="password" minlength="6" required />
            </label>
            <label>
              Confirm password
              <input name="confirmPassword" type="password" minlength="6" required />
            </label>
            <div class="actions">
              <button type="submit">Request Access</button>
              <p id="register-status" class="status"></p>
            </div>
          </form>
        </div>

        <form id="reset-form" class="auth-panel">
          <h2>Forgot Password</h2>
          <label>
            Email
            <input name="email" type="email" required />
          </label>
          <div class="actions">
            <button type="submit">Request Reset</button>
            <p id="reset-status" class="status"></p>
          </div>
          <p class="status">Admin will review the request and set a new password for you.</p>
        </form>
      </section>
    </main>

    <script src="/login.js?v=workspace-9"></script>
  </body>
</html>
