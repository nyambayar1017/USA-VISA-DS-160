<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-387" />
  </head>
  <body class="app-body" data-page="documents">
    <div class="workspace-shell">
      <aside class="workspace-sidebar" data-workspace-sidebar></aside>

      <main class="workspace-main">
        <section class="workspace-topbar">
          <div>
            <p class="workspace-kicker">Storage</p>
            <h1>Documents</h1>
            <p class="workspace-subtitle">Every file uploaded against any trip in this workspace — search, filter, download, jump to its trip.</p>
          </div>
          <div class="workspace-profile">
            <span class="workspace-profile-label">Signed in</span>
            <strong data-profile-name>TravelX Staff</strong>
            <span data-profile-email>Loading profile...</span>
          </div>
        </section>

        <section class="card">
          <div class="invoices-saved-filter-row">
            <details class="trip-saved-filter-dropdown" data-saved-filter-dropdown>
              <summary>
                <span data-saved-filter-current>Select saved filter</span>
                <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true"><path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </summary>
              <div class="trip-saved-filter-popover" data-saved-filter-popover></div>
            </details>
            <button type="button" id="doc-clear-filter-btn" class="trip-saved-filter-action">Clear</button>
            <details class="trip-saved-filter-dropdown" id="doc-view-dropdown">
              <summary>
                <span>View</span>
                <svg viewBox="0 0 12 12" width="10" height="10" aria-hidden="true"><path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </summary>
              <div class="trip-saved-filter-popover tourist-view-popover" id="doc-view-popover"></div>
            </details>
          </div>

          <div class="invoices-filter-bar">
            <input id="doc-filter-name" type="search" placeholder="Search by file name" autocomplete="off" />
            <input id="doc-filter-tourist" type="search" placeholder="Search by name" autocomplete="off" />
            <input id="doc-filter-destination" type="search" placeholder="Search destination" autocomplete="off" />
            <select id="doc-filter-trip" class="trip-filter-input">
              <option value="">All trips</option>
            </select>
            <select id="doc-filter-category" class="trip-filter-input">
              <option value="">All categories</option>
            </select>
            <select id="doc-filter-ext" class="trip-filter-input">
              <option value="">All file types</option>
            </select>
            <details class="trip-filter-pill trip-filter-pill-date" id="doc-daterange-pill">
              <summary>
                <span class="trip-filter-pill-icon trip-filter-date-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M3 10h18M8 3v4M16 3v4"></path></svg>
                </span>
                <span class="trip-filter-pill-label">Uploaded between</span>
                <span class="trip-filter-pill-count" id="doc-daterange-count" hidden>0</span>
              </summary>
              <div class="trip-filter-popover trip-filter-popover-date">
                <label>From <input id="doc-filter-from" type="date" /></label>
                <label>To <input id="doc-filter-to" type="date" /></label>
              </div>
            </details>
            <button type="button" class="secondary-button" id="doc-reset">Reset</button>
          </div>

          <p class="invoices-count" id="doc-count"></p>
          <div class="invoices-table-wrap">
            <table class="invoices-table" id="doc-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>File</th>
                  <th>Last name</th>
                  <th>First name</th>
                  <th>Trip</th>
                  <th>Destinations</th>
                  <th>Category</th>
                  <th>Type</th>
                  <th>Size</th>
                  <th>Uploaded</th>
                  <th>By</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="doc-tbody"></tbody>
            </table>
          </div>
          <div id="doc-pagination"></div>
        </section>
      </main>
    </div>
    <script src="/compress-upload.js?v=workspace-1"></script>
    <script src="/app-shell.js?v=workspace-147"></script>
    <script src="/pagination.js?v=workspace-1"></script>
    <script src="/documents-page.js?v=workspace-9"></script>
      <script src="/ui-dialog.js?v=workspace-1"></script>
  </body>
</html>
