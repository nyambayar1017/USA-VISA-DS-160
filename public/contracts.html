<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Maker</title>
    <link rel="icon" type="image/png" href="/assets/favicon-dtx-x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=workspace-265" />
  </head>
  <body class="app-body" data-page="contracts">
    <div class="workspace-shell">
      <aside class="workspace-sidebar" data-workspace-sidebar></aside>

      <main class="workspace-main">
        <section class="workspace-topbar">
          <div>
            <p class="workspace-kicker">Contracts</p>
            <h1>Contract Maker</h1>
            <p class="workspace-subtitle">Fill the form, generate the contract, and send a signing link.</p>
          </div>
          <div class="workspace-profile">
            <span class="workspace-profile-label">Signed in</span>
            <strong data-profile-name>TravelX Staff</strong>
            <span data-profile-email>Loading profile...</span>
          </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>New contract</h2>
            <div class="camp-toolbar">
              <button type="button" id="contract-toggle-form">Create Contract</button>
            </div>
          </div>

          <div id="contract-form-panel" class="camp-modal workspace-form-modal is-hidden" hidden>
            <div class="camp-modal-backdrop" data-action="close-contract-panel"></div>
            <div class="camp-modal-dialog contract-modal workspace-form-modal-dialog">
              <div class="camp-modal-header">
                <div>
                  <h2>Contract details</h2>
                  <p class="camp-modal-copy">Fill all required fields. Red words from Word are replaced automatically.</p>
                </div>
                <button type="button" class="camp-modal-close" data-action="close-contract-panel" aria-label="Close contract window">×</button>
              </div>
              <div id="contract-count-setup" class="field-grid contract-grid">
                <label>
                  Том хүний тоо
                  <input name="setupAdultCount" type="number" min="0" value="1" />
                </label>
                <label>
                  Хүүхдийн тоо
                  <input name="setupChildCount" type="number" min="0" value="0" />
                </label>
                <label>
                  Нярайн тоо
                  <input name="setupInfantCount" type="number" min="0" value="0" />
                </label>
                <label>
                  Зөвхөн билет
                  <input name="setupTicketOnlyCount" type="number" min="0" value="0" />
                </label>
                <label>
                  Зөвхөн газрын үйлчилгээ
                  <input name="setupLandOnlyCount" type="number" min="0" value="0" />
                </label>
                <label>
                  Бусад
                  <input name="setupCustomCount" type="number" min="0" value="0" />
                </label>
                <div class="actions full-span">
                  <button type="button" id="contract-continue-button" data-action="contract-continue">Continue</button>
                </div>
              </div>

              <form id="contract-form" class="field-grid contract-grid is-hidden" hidden>
                <label>
                  Гэрээний дугаар (автоматаар үүснэ)
                  <input name="contractSerial" placeholder="DTX-09-26-001" />
                </label>
                <label>
                  Гэрээ байгуулсан өдөр
                  <input name="contractDate" type="date" required />
                </label>
                <label>
                  Менежерийн нэр (сонгох)
                  <select id="manager-select" name="managerSelect" required>
                    <option value="">Нэвтэрсэн хэрэглэгч</option>
                  </select>
                </label>
                <label class="is-hidden">
                  Менежерийн овог
                  <input name="managerLastName" required />
                </label>
                <label class="is-hidden">
                  Менежерийн нэр
                  <input name="managerFirstName" required />
                </label>
                <label class="is-hidden">
                  Менежерийн и-мэйл
                  <input name="managerEmail" />
                </label>
                <label class="is-hidden">
                  Менежерийн гар утас
                  <input name="managerPhone" />
                </label>
                <label class="is-hidden">
                  Менежерийн гарын үсэг
                  <input name="managerSignaturePath" />
                </label>
                <label>
                  Жуулчны овог
                  <input name="touristLastName" required />
                </label>
                <label>
                  Жуулчны нэр
                  <input name="touristFirstName" required />
                </label>
                <label>
                  Жуулчны регистр
                  <input name="touristRegister" required />
                </label>
                <label>
                  Аяллын чиглэл
                  <input name="destination" required />
                </label>
                <label>
                  Аялал эхлэх өдөр
                  <input name="tripStartDate" type="date" required />
                </label>
                <label>
                  Аялал дуусах өдөр
                  <input name="tripEndDate" type="date" required />
                </label>
                <label>
                  Аяллын хугацаа (өдөр/шөнө)
                  <input name="tripDuration" placeholder="8 өдөр 7 шөнө" required />
                </label>
                <input name="adultCount" type="hidden" value="1" />
                <input name="childCount" type="hidden" value="0" />
                <input name="infantCount" type="hidden" value="0" />
                <input name="ticketOnlyCount" type="hidden" value="0" />
                <input name="landOnlyCount" type="hidden" value="0" />
                <input name="customCount" type="hidden" value="0" />
                <label>
                  Том хүний тоо
                  <input name="adultCountDisplay" type="number" value="1" readonly />
                </label>
                <label>
                  Том хүний үнэ
                  <input name="adultPrice" value="0" required />
                </label>
                <label class="price-field" data-price-field="child-count">
                  Хүүхдийн тоо
                  <input name="childCountDisplay" type="number" value="0" readonly />
                </label>
                <label class="price-field" data-price-field="child">
                  Хүүхдийн үнэ
                  <input name="childPrice" value="0" />
                </label>
                <label class="price-field" data-price-field="infant-count">
                  Нярайн тоо
                  <input name="infantCountDisplay" type="number" value="0" readonly />
                </label>
                <label class="price-field" data-price-field="infant">
                  Нярайн үнэ
                  <input name="infantPrice" value="0" />
                </label>
                <label class="price-field" data-price-field="landOnly-count">
                  Газрын үйлчилгээтэй хүний тоо
                  <input name="landOnlyCountDisplay" type="number" value="0" readonly />
                </label>
                <label class="price-field" data-price-field="landOnly">
                  Газрын үйлчилгээтэй хүний үнэ
                  <input name="landOnlyPrice" value="0" />
                </label>
                <label class="price-field" data-price-field="ticketOnly-count">
                  Зөвхөн билет
                  <input name="ticketOnlyCountDisplay" type="number" value="0" readonly />
                </label>
                <label class="price-field" data-price-field="ticketOnly">
                  Зөвхөн билетийн үнэ
                  <input name="ticketOnlyPrice" value="0" />
                </label>
                <label class="price-field" data-price-field="custom-count">
                  Бусад тоо
                  <input name="customCountDisplay" type="number" value="0" readonly />
                </label>
                <label class="price-field" data-price-field="custom">
                  Бусад нэр
                  <input name="customPriceLabel" placeholder="Нэмэлт үйлчилгээ" />
                </label>
                <label class="price-field" data-price-field="custom">
                  Бусад үнэ
                  <input name="customPrice" value="0" />
                </label>
                <label>
                  Нийт хүн (тооцоолно)
                  <input name="travelerCount" type="number" min="0" />
                </label>
                <label>
                  Нийт төлбөр (автоматаар тооцно)
                  <input name="totalPrice" value="0" readonly />
                </label>
                <label>
                  Урьдчилгаа төлбөрийн хувь
                  <select name="depositPercentage">
                    <option value="manual">Гараар оруулах</option>
                    <option value="10">10%</option>
                    <option value="20">20%</option>
                    <option value="30">30%</option>
                    <option value="40">40%</option>
                    <option value="50">50%</option>
                  </select>
                </label>
                <label>
                  Урьдчилгаа төлбөрийн дүн
                  <input name="depositAmount" type="number" min="0" value="0" required />
                </label>
                <label>
                  Үлдэгдэл төлбөр
                  <input name="balanceAmountDisplay" value="0" readonly />
                </label>
                <label>
                  Урьдчилгаа төлбөр төлөх огноо
                  <input name="depositDueDate" type="date" required />
                </label>
                <label>
                  Үлдэгдэл төлбөр төлөх нөхцөл
                  <select name="balanceDuePreset">
                    <option value="30">Аялаас 30 хоногийн өмнө</option>
                    <option value="20">Аялаас 20 хоногийн өмнө</option>
                    <option value="15">Аялаас 15 хоногийн өмнө</option>
                    <option value="10">Аялаас 10 хоногийн өмнө</option>
                    <option value="7" selected>Аялаас 7 хоногийн өмнө</option>
                  </select>
                </label>
                <label>
                  Үлдэгдэл төлбөр төлөх огноо
                  <input name="balanceDueDate" type="date" required />
                </label>
                <label class="full-span">
                  Bank account (used on the auto-generated invoice only — not on the contract)
                  <select name="bankAccountId" id="contract-bank-account">
                    <option value="">— Choose —</option>
                  </select>
                </label>
                <div class="actions full-span">
                  <button type="submit">Save contract</button>
                  <p id="contract-status" class="status"></p>
                </div>
              </form>
            </div>
          </div>

          <div class="field-grid contract-filter-grid">
            <label>
              Менежер
              <select id="contract-filter-manager">
                <option value="">Бүгд</option>
              </select>
            </label>
            <label>
              Чиглэл
              <input id="contract-filter-destination" placeholder="Солонгос" />
            </label>
            <label>
              Эхлэх огноо
              <input id="contract-filter-date-from" type="date" />
            </label>
            <label>
              Дуусах огноо
              <input id="contract-filter-date-to" type="date" />
            </label>
          </div>

          <div id="contract-list" class="submission-list"></div>
          <div id="contract-pagination" class="contract-pagination"></div>
        </section>
      </main>
    </div>
    <script src="/compress-upload.js?v=workspace-1"></script>
    <script src="/app-shell.js?v=workspace-113"></script>
    <script src="/contracts.js?v=workspace-7"></script>
      <script src="/ui-dialog.js?v=workspace-1"></script>
  </body>
</html>
