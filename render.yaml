services:
  - type: web
    name: ds160-intake-form
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
    aptPackages:
      - libcairo2
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libgdk-pixbuf-2.0-0
      - libffi-dev
      - shared-mime-info